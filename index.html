<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="/logo5-2.png" />
        <link rel="apple-touch-icon" href="/logo5-2.png" />
        <link rel="manifest" href="/manifest.json" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <meta name="theme-color" content="#0f172a" />
        <meta
            name="description"
            content="Kaiju Spending Control — Seguí tus gastos con Google Sheets"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Kaiju" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <title>Kaiju Spending Control</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", function () {
                    navigator.serviceWorker.register("/sw.js").then(
                        function (registration) {
                            console.log(
                                "SW registered: ",
                                registration.scope,
                            );
                        },
                        function (err) {
                            console.log("SW registration failed: ", err);
                        },
                    );
                });
            }
        </script>
    </body>
</html>
