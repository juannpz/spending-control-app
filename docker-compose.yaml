services:
    client:
        container_name: spending-app-client
        build:
            context: .
            args:
                - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
                - VITE_GOOGLE_API_KEY=${VITE_GOOGLE_API_KEY}
                - VITE_APP_VERSION=${VITE_APP_VERSION}
        restart: unless-stopped
